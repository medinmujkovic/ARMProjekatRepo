<VirtualHost *:80>
    ServerName www.local.arm.com
    ServerAlias local.arm.com
    
    # Preusmjeravanje sa HTTP na HTTPS
    Redirect permanent / https://www.local.arm.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName www.local.arm.com
    ServerAlias local.arm.com
    DocumentRoot /var/www/html

    # Aktivacija SSL-a i putanje do certifikata unutar kontejnera
    SSLEngine on
    SSLCertificateFile /etc/apache2/certs/www.local.arm.com-2026-06-03-095440.pem
    SSLCertificateKeyFile /etc/apache2/certs/www.local.arm.com-2026-06-03-095440.pkey

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>