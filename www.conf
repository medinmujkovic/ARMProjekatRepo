<VirtualHost *:80>
    ServerName www.local.arm.com
    ServerAlias local.arm.com
    
    # Automatski šalje sve na sigurni HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName www.local.arm.com
    ServerAlias local.arm.com

    SSLEngine on
    # PAZI: Putanje do certifikata moraju biti tačne na tvom EC2 serveru
    SSLCertificateFile /etc/apache2/certs/www.local.arm.com-2026-06-03-095440.pem
    SSLCertificateKeyFile /etc/apache2/certs/www.local.arm.com-2026-06-03-095440.pkey

    # OVO JE NAJVAŽNIJI DIO - REVERSE PROXY
    ProxyPreserveHost On
    
    # Govorimo Apache-u da sve šalje u Docker na port 3000
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Zaglavlje koje sprečava "Too many redirects" grešku
    RequestHeader set X-Forwarded-Proto "https"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>