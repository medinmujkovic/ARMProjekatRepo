<VirtualHost *:80>
    ServerName 100.57.1.82
    Redirect permanent / https://100.57.1.82/
</VirtualHost>

<VirtualHost *:443>
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/www.local.arm.com.pem
    SSLCertificateKeyFile /etc/ssl/private/www.local.arm.com.key

    ErrorLog ${APACHE_LOG_DIR}/node-app-error.log
    CustomLog ${APACHE_LOG_DIR}/node-app-access.log combined
</VirtualHost>