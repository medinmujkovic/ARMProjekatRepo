services:
  app:
    build: .
    container_name: arm-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - /etc/app.env
    depends_on:
      - wait-for-db

  wait-for-db:
    image: busybox
    env_file:
      - /etc/app.env  # <-- KLJUČNO: Učitavamo dinamički env fajl i ovdje
    command: >
      sh -c "
        until nc -z \$$DB_HOST 3306; do
          echo \"Cekam MySQL na \$DB_HOST...\";
          sleep 3;
        done;
        echo 'MySQL je dostupan na adresi '\$DB_HOST'!'
      "