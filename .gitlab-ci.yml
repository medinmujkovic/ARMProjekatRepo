stages:
  - deploy

deploy_application:
  stage: deploy
  tags:
    - arm-runner
  script:
    # 1. Zaustavi i obriši stari kontejner ako postoji
    - sudo docker stop arm_frontend || true
    - sudo docker rm arm_frontend || true

    # 2. Buildaj novi Docker image
    - sudo docker build -t arm_apache_web:latest .

    # 3. Pokreni novi kontejner (Sve u jednoj liniji bez kosih crta)
    - sudo docker run -d --name arm_frontend -p 80:80 -p 443:443 -v /home/ubuntu/certs:/etc/apache2/certs --restart always arm_apache_web:latest

    # 4. Ispis pokrenutih kontejnera
    - sudo docker ps