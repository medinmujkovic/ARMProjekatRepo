stages:
  - debug

debug_application:
  stage: debug
  tags:
    - arm-runner
  script:
    - echo "=== 1. PROVJERA DA LI JE KONTEJNER ZIV ILI MRTV ==="
    - sudo docker ps -a

    - echo "=== 2. ISPIS LOGOVA (AKO JE PUKAO DA VIDIMO ZASTO) ==="
    - sudo docker logs arm_frontend || true

    - echo "=== 3. PROVJERA KOJI DOCKER KORISTI RUNNER ==="
    - which docker
    - sudo docker info | grep -i snap || echo "Nije snap verzija"