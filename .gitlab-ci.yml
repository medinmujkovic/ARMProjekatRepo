stages:
  - deploy

deploy_to_ec2:
  stage: deploy
  tags:
    - arm-runner  # <--- OVO JE KLJUČNO! Govori GitLabu da koristi tvoj EC2 runner
  script:
    - echo "Započinjem automatski deployment na AWS EC2..."
    
    # 1. Izgradnja nove Docker slike
    - sudo docker build -t arm_apache_web:latest .
    
    # 2. Zaustavljanje i brisanje starog kontejnera
    - sudo docker stop arm_frontend || true
    - sudo docker rm arm_frontend || true
    
    # 3. Pokretanje novog kontejnera na portu 8080
    - sudo docker run -d --name arm_frontend -p 8080:8080 -e ASPNETCORE_URLS="http://+:8080" --restart always arm_apache_web:latest
    
    # 4. Restartovanje Apache servera (Proxy)
    - sudo systemctl restart apache2
    
    - echo "Deployment uspješno završen!"
  only:
    - main # Ako ti se glavna grana zove 'master', promijeni ovdje u master