stages:
  - deploy

deploy_to_ec2:
  stage: deploy
  tags: 
    - arm-runner  
  script:
    # 1. Sinhronizuj kod (korisnik gitlab-runner je vlasnik, ne treba sudo)
    - rsync -av --delete --exclude='.git' --exclude='node_modules' --exclude='terraform' ./ /opt/app/
    
    # 2. Pokreni deploy skriptu (ona već sadrži svu logiku za docker)
    - sudo /opt/deploy.sh
    
    # 3. Ažuriraj Apache konfiguraciju
    - sudo cp /opt/app/www.conf /etc/apache2/sites-available/node_app.conf
    - sudo a2ensite node_app.conf
    - sudo systemctl restart apache2