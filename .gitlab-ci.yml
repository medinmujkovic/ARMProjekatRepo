stages:
  - deploy

variables:
  APP_DIR: /opt/app

deploy_to_ec2:
  stage: deploy
  tags: 
    - arm-runner  
  only:
    - main
  script:
    - echo "Započinjem deployment Node.js aplikacije..."
    
    # 1. Kopiranje koda na server
    - rsync -av --delete --exclude='.git' --exclude='node_modules' --exclude='terraform' ./ $APP_DIR/
    
    # 2. Postavljanje dozvola
    - chown -R ubuntu:ubuntu $APP_DIR
    
    # 3. Build Node.js slike
    - cd $APP_DIR
    - sudo docker build -t arm_node_web:latest .
    
    # 4. Gašenje starog kontejnera ako postoji
    - sudo docker stop arm_frontend || true
    - sudo docker rm arm_frontend || true
    
    # 5. Pokretanje NOVOG kontejnera na portu 3000 sa ubačenim env varijablama za bazu
    - sudo docker run -d \
        --name arm_frontend \
        -p 3000:3000 \
        --env-file /etc/app.env \
        --restart always \
        arm_node_web:latest
    
    # 6. Restart Apache proxy-ja
    - sudo systemctl restart apache2
    
    - echo "Node.js aplikacija je uspješno podignuta!"
  environment:
    name: production