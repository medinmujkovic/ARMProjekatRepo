stages:
  - deploy

deploy_application:
  stage: deploy
  tags:
    - arm-runner
  script:
  - sudo docker stop arm_frontend || true
  - sudo docker rm -f arm_frontend || true  # Dodali smo -f (force)
  - sudo docker build -t arm_apache_web:latest .
  # Dodali smo mapiranje certifikata u docker run komandu da aplikacija vidi gdje su
  - sudo docker run -d --name arm_frontend -p 80:8080 -p 443:8080 \
    -v /home/ubuntu/certs:/https \
    -e ASPNETCORE_Kestrel__Certificates__Default__Path="/https/certifikat.pfx" \
    -e ASPNETCORE_Kestrel__Certificates__Default__Password="123" \
    --restart always arm_apache_web:latest